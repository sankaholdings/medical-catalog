<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>さんかホールディングス株式会社 — Medical Catalog</title>
  <meta name="description" content="さんかホールディングス株式会社による海外渡航者向け医療受診支援カタログ。再生医療・美容・健診・耳鼻咽喉の9拠点全メニュー。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    /* Mobile responsiveness for lang buttons */
    @media (max-width: 480px) {
      .lang-btn__code { font-size: 22px; }
      .lang-select-card { padding: 48px 28px; }
    }
  </style>
</head>
<body>
  <div class="lang-select-page">
    <div class="lang-select-card">
      <div class="lang-select-card__eyebrow">Medical Catalog</div>

      <div class="lang-select-card__logo-wrap">
        <img src="assets/images/logo/logo.png"
             class="lang-select-card__logo"
             alt="さんかホールディングス株式会社" />
      </div>

      <h1 class="lang-select-card__title">
        <span class="lang-select-card__title-ja">さんかホールディングス株式会社</span>
        <span class="lang-select-card__title-en">Sanka Holdings Co., Ltd.</span>
      </h1>
      <p class="lang-select-card__sub">海外渡航者向け医療受診支援 &nbsp;|&nbsp; International Medical Support</p>
      <div class="lang-select-divider"></div>

      <p style="font-size:12px; color:var(--text-muted); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:24px;">
        Select Language / 言語を選択 / 选择语言
      </p>

      <div class="lang-buttons">
        <a href="ja/index.html" class="lang-btn" lang="ja">
          <span class="lang-btn__code">日</span>
          <span class="lang-btn__name">日本語</span>
          <span class="lang-btn__native">Japanese</span>
        </a>
        <a href="zh-cn/index.html" class="lang-btn" lang="zh-Hans">
          <span class="lang-btn__code">中</span>
          <span class="lang-btn__name">中文（简体）</span>
          <span class="lang-btn__native">Simplified Chinese</span>
        </a>
        <a href="en/index.html" class="lang-btn" lang="en">
          <span class="lang-btn__code">En</span>
          <span class="lang-btn__name">English</span>
          <span class="lang-btn__native">English</span>
        </a>
      </div>

      <p style="margin-top:48px; font-size:11px; color:var(--text-muted); letter-spacing:0.06em;">
        &copy; 2025 さんかホールディングス株式会社 / Sanka Holdings Co., Ltd.
      </p>
    </div>
  </div>

</html>
